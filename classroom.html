<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองห้องประชุม HCRD | มก.กพส.</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --ku-green: #006633;
            --bg-color: #fcfdfe;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --border: #edf2f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Header Section (Centered) --- */
        .hero-section {
            width: 100%;
            padding: 80px 20px 60px;
            text-align: center;
            background: white;
            border-bottom: 1px solid var(--border);
        }

        .main-logo {
            height: 120px;
            margin-bottom: 30px;
        }

        .hero-section h1 {
            font-size: 2.2rem;
            font-weight: 500;
            color: var(--ku-green);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .hero-section p {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* --- Main Content --- */
        .main-container {
            max-width: 900px;
            width: 95%;
            margin-top: -30px; /* ให้กล่องเมนูเกยขึ้นไปนิดหน่อยดูมีมิติ */
        }

        /* --- Menu Grid --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .menu-item {
            background: var(--card-bg);
            padding: 40px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.25s ease;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.05);
            border-color: var(--ku-green);
        }

        .menu-item i {
            font-size: 2.5rem;
            color: var(--ku-green);
            margin-bottom: 20px;
        }

        .menu-item span {
            font-size: 1.25rem;
            font-weight: 400;
        }

        /* --- Footer Info (Bottom Centered) --- */
        .info-footer {
            margin-top: auto;
            width: 100%;
            padding: 60px 20px 40px;
            text-align: center;
        }

        .dev-box {
            display: inline-block;
            padding: 20px 40px;
            background: white;
            border-radius: 100px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .dev-box p {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .dev-box b {
            color: var(--ku-green);
            font-weight: 500;
        }

        .clock-section {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .status-badge {
            display: inline-block;
            background: #f0fdf4;
            color: #166534;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            border: 1px solid #dcfce7;
        }

        @media (max-width: 600px) {
            .menu-grid { grid-template-columns: 1fr; }
            .hero-section h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body onload="startTime()">

    <header class="hero-section">
        <img src="HCRD.png" alt="HCRD Logo" class="main-logo">
        <div class="status-badge">Development Version</div>
        <h1>ระบบจองห้องประชุม</h1>
        <p>ภาควิชาการพัฒนาทรัพยากรมนุษย์และชุมชน มก.กพส.</p>
    </header>

    <div class="main-container">
        <div class="menu-grid">
            <a href="#" class="menu-item">
                <i class="fas fa-calendar-plus"></i>
                <span>จองห้องประชุม</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-clock-rotate-left"></i>
                <span>ตรวจสอบสถานะ</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-list-ul"></i>
                <span>ข้อมูลห้องประชุม</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-user-circle"></i>
                <span>เจ้าหน้าที่ระบบ</span>
            </a>
        </div>
    </div>

    <div class="info-footer">
        <div class="dev-box">
            <p>ออกแบบและพัฒนาโดย <b>นายเมธี ใจสุขดี</b></p>
            <p style="font-size: 0.85rem;">นิสิตชั้นปีที่ 2 สาขาเกษตรและสิ่งแวดล้อมศึกษา</p>
        </div>
        
        <div class="clock-section">
            <span id="date-text"></span> | <span id="time-text" style="color: var(--ku-green); font-weight: 500;"></span>
        </div>
    </div>

    <script>
        function startTime() {
            const now = new Date();
            const dateOptions = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date-text').innerText = now.toLocaleDateString('th-TH', dateOptions);
            document.getElementById('time-text').innerText = now.toLocaleTimeString('th-TH');
            setTimeout(startTime, 1000);
        }
    </script>
</body>
</html>
