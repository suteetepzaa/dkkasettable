<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองห้องประชุม HCRD</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center; /* จัดทุกอย่างให้อยู่กึ่งกลางหน้าจอ */
        }

        /* --- Header: โลโก้และชื่อระบบอยู่ตรงกลาง --- */
        header {
            text-align: center;
            padding: 60px 20px;
            width: 100%;
        }

        .dept-logo {
            height: 150px; /* ปรับขนาดโลโก้ให้เด่น */
            width: auto;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #006633;
            margin-bottom: 10px;
        }

        .dept-subname {
            font-size: 1.2rem;
            color: #666;
            font-weight: 300;
        }

        /* --- Main Menu --- */
        .container {
            max-width: 1000px;
            width: 90%;
            margin-bottom: 50px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .menu-card {
            background: #f9f9f9;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: #333;
            border: 1px solid #eee;
            transition: 0.3s;
        }

        .menu-card:hover {
            background: #006633;
            color: #fff;
        }

        .menu-card i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .menu-card span {
            font-size: 1.2rem;
            font-weight: 500;
        }

        /* --- Developer Info --- */
        .dev-info {
            text-align: center;
            padding: 30px;
            border-top: 1px solid #eee;
            width: 100%;
            margin-top: auto;
        }

        .dev-info b {
            color: #006633;
        }

        footer {
            background: #f4f4f4;
            width: 100%;
            padding: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body onload="startTime()">

    <header>
        <img src="HCRD.png" alt="โลโก้ภาควิชา" class="dept-logo">
        <h1>ระบบจองห้องประชุม</h1>
        <p class="dept-subname">ภาควิชาการพัฒนาทรัพยากรมนุษย์และชุมชน มก.กพส.</p>
        <div style="margin-top: 15px; color: #888;">
            <span id="date-now"></span> | <span id="time-now" style="font-weight: bold; color: #006633;"></span>
        </div>
    </header>

    <div class="container">
        <div class="menu-grid">
            <a href="#" class="menu-card">
                <i class="fas fa-calendar-check"></i>
                <span>จองห้องประชุม</span>
            </a>
            <a href="#" class="menu-card">
                <i class="fas fa-search"></i>
                <span>ตรวจสอบสถานะ</span>
            </a>
            <a href="#" class="menu-card">
                <i class="fas fa-hotel"></i>
                <span>ห้องประชุมทั้งหมด</span>
            </a>
            <a href="#" class="menu-card">
                <i class="fas fa-user-lock"></i>
                <span>เข้าสู่ระบบ</span>
            </a>
        </div>
    </div>

    <div class="dev-info">
        <p>ออกแบบและพัฒนาโดย: <b>นายเมธี ใจสุขดี</b></p>
        <p>นิสิตชั้นปีที่ 2 สาขาเกษตรและสิ่งแวดล้อมศึกษา</p>
    </div>

    <footer>
        &copy; 2026 ภาควิชาการพัฒนาทรัพยากรมนุษย์และชุมชน มก.กพส.
    </footer>

    <script>
        function startTime() {
            const now = new Date();
            const dateOptions = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date-now').innerHTML = now.toLocaleDateString('th-TH', dateOptions);
            document.getElementById('time-now').innerHTML = now.toLocaleTimeString('th-TH');
            setTimeout(startTime, 1000);
        }
    </script>
</body>
</html>
