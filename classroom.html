<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCRD Booking | Next-Gen Reservation</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@100;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --main-bg: #0f172a; /* สีกรมท่าเข้มแบบแอปสมัยใหม่ */
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #10b981; /* สีเขียวมรกต สว่างและทันสมัย */
            --text-white: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background-color: var(--main-bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(16, 185, 129, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 102, 51, 0.2) 0%, transparent 40%);
            min-height: 100vh;
            color: var(--text-white);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* --- Main App Container --- */
        .app-window {
            width: 90%;
            max-width: 1100px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 60px 40px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- Floating Header --- */
        .header-content {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-box {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 28px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
        }

        .logo-box img {
            width: 100%;
            height: auto;
        }

        .header-content h1 {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-content p {
            color: #94a3b8;
            font-weight: 300;
            font-size: 1.1rem;
        }

        /* --- Interactive Menu Grid --- */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 40px 30px;
            border-radius: 30px;
            text-decoration: none;
            color: var(--text-white);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            transform: translateY(-10px) scale(1.02);
        }

        .nav-card i {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }

        .nav-card h3 {
            font-size: 1.2rem;
            font-weight: 400;
        }

        /* --- Footer Info --- */
        .footer-info {
            margin-top: 60px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-top: 30px;
            border-top: 1px solid var(--glass-border);
        }

        .dev-tag {
            font-size: 0.9rem;
        }

        .dev-tag b {
            color: var(--accent);
            font-weight: 500;
        }

        .time-display {
            text-align: right;
            font-family: monospace;
            color: var(--accent);
            font-size: 1.1rem;
        }

        /* --- Dev Badge --- */
        .badge {
            position: absolute;
            top: 30px;
            right: 40px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 100px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .app-window { padding: 40px 20px; border-radius: 0; width: 100%; }
            .header-content h1 { font-size: 2rem; }
            .footer-info { flex-direction: column; align-items: center; gap: 20px; text-align: center; }
        }
    </style>
</head>
<body onload="startTime()">

    <div class="app-window">
        <div class="badge">Development Phase</div>

        <div class="header-content">
            <div class="logo-box">
                <img src="HCRD.png" alt="HCRD">
            </div>
            <h1>ห้องประชุม HCRD</h1>
            <p>ระบบจัดการพื้นที่การเรียนรู้ยุคใหม่ ภาควิชา HCRD มก.กพส.</p>
        </div>

        <div class="grid-layout">
            <a href="#" class="nav-card">
                <i class="fas fa-bolt"></i>
                <h3>จองด่วนตอนนี้</h3>
            </a>
            <a href="#" class="nav-card">
                <i class="fas fa-layer-group"></i>
                <h3>สถานะห้อง</h3>
            </a>
            <a href="#" class="nav-card">
                <i class="fas fa-fingerprint"></i>
                <h3>เข้าสู่ระบบ</h3>
            </a>
            <a href="#" class="nav-card">
                <i class="fas fa-compass"></i>
                <h3>คู่มือใช้งาน</h3>
            </a>
        </div>

        <div class="footer-info">
            <div class="dev-tag">
                <p>Designed & Coded with <i class="fas fa-heart" style="color: #e11d48;"></i></p>
                <p><b>นายเมธี ใจสุขดี</b> | นิสิตปี 2 เกษตรและสิ่งแวดล้อมศึกษา</p>
            </div>
            <div class="time-display">
                <div id="date-text" style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 5px;"></div>
                <div id="clock-text"></div>
            </div>
        </div>
    </div>

    <script>
        function startTime() {
            const now = new Date();
            const dateOptions = { day: 'numeric', month: 'short', year: 'numeric' };
            document.getElementById('date-text').innerText = now.toLocaleDateString('th-TH', dateOptions);
            document.getElementById('clock-text').innerText = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            setTimeout(startTime, 1000);
        }
    </script>

</body>
</html>
